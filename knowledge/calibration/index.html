<!DOCTYPE html>
<html lang="en">
<head><base href="/satish-portfolio/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Instrument calibration procedures and standards.">
  <title>Calibration – Instrumentation Mastery</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="/assets/js/components.js"></script>
</head>
<body>
  <div id="app">
    <div id="header-placeholder"></div>
    
    <div class="lesson-container" style="grid-template-columns: 1fr;">
      <main class="main-content">
        <nav class="breadcrumb">
          <a href="/">Home</a> > 
          <a href="/knowledge/">Library</a> > 
          <span>Calibration</span>
        </nav>
        
        <header class="lesson-header">
          <h1>🎯 Calibration</h1>
          <p style="color: var(--text-secondary); margin-top: 1rem;">
            Instrument calibration procedures and standards.
          </p>
        </header>
        
        <section class="lesson-section">
          <h2>Available Lessons</h2>
          <div class="tools-grid" id="lessons-grid">
            <!-- Lessons loaded dynamically -->
          </div>
        </section>
      </main>
    </div>
    
    <div id="footer-placeholder"></div>
  </div>
  
  <script>
    async function loadCategoryLessons() {
      const response = await fetch('/assets/data/content-map.json');
      const data = await response.json();
      const grid = document.getElementById('lessons-grid');
      const lessons = data.lessons.filter(l => l.category === 'calibration');
      
      grid.innerHTML = lessons.map(lesson => `
        <a href="/knowledge/calibration/` + lesson.slug + `.html" class="tool-card">
          <h3>` + lesson.title + `</h3>
          <p>` + lesson.excerpt + `</p>
        </a>
      `).join('') || '<p style="color: var(--text-secondary);">Lessons coming soon...</p>';
    }
    
    document.addEventListener('DOMContentLoaded', loadCategoryLessons);
  </script>
  <script>loadComponents();</script>
</body>
</html>

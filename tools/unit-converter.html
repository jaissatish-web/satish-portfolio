<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instrumentation Multi-Unit Converter — Satish Jaiswal Portfolio</title>
<meta name="description" content="Simultaneous multi-target unit conversion for pressure, temperature, flow, and mass engineering units.">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{fontFamily:{mono:['JetBrains Mono','monospace'],sans:['Inter','sans-serif']}}}}
</script>
<link rel="stylesheet" href="../assets/css/global.css">
<style>
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#818cf8;cursor:pointer;border:3px solid #fff;box-shadow:0 0 10px rgba(16,185,129,.3)}
</style>
</head>
<body>

<!-- GLOBAL HEADER -->
<a href="#main-content" class="skip-nav">Skip to content</a>
<header id="global-header">
  <div class="header-inner">
    <a href="../index.html" class="header-logo">
      <div class="header-logo-bracket">SJ</div>
      <div class="header-logo-text"><span class="header-logo-name">Satish Jaiswal</span><span class="header-logo-role">I&amp;C LEAD</span></div>
    </a>
    <div class="header-status"><span class="pulse"></span><span>TOOL: UNIT CONVERTER</span></div>
    <nav class="header-nav" aria-label="Primary">
      <a href="../index.html">Portfolio</a>
      <a href="../tools.html" class="active">Toolkit</a>
      <a href="../index.html#contact">Contact</a>
    </nav>
    <div class="header-actions">
      <a href="../assets/docs/Satish_Jaiswal_Resume.pdf" target="_blank" class="btn-cv"><i data-lucide="download" style="width:12px;height:12px"></i><span>CV</span></a>
      <button class="btn-cv" onclick="togglePalette()"><i data-lucide="search" style="width:12px;height:12px"></i><span style="font-size:9px">K</span></button>
    </div>
  </div>
</header>
<!-- Command Palette -->
<div id="command-palette" role="dialog"><div class="cp-box"><div class="cp-input-row"><i data-lucide="search" style="width:16px;height:16px;color:#64748b"></i><input type="text" id="cp-input" placeholder="Type command..." autocomplete="off"><span class="cp-hint">ESC</span></div><div class="cp-list" id="cp-list"></div></div></div>

<!-- Content -->
<div class="min-h-screen flex items-center justify-center px-6 pt-14 pb-20">
  <div class="w-full max-w-2xl mx-auto" style="animation:fadeUp .6s ease forwards">

    <!-- Header -->
    <div class="text-center mb-10 mt-8">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-rose-500/10 to-rose-400/5 border border-rose-500/20 flex items-center justify-center mx-auto mb-5">
        <i data-lucide="repeat" class="w-7 h-7 text-rose-400"></i>
      </div>
      <h1 class="text-2xl md:text-3xl font-bold font-mono tracking-tight grad-text">Instrumentation Multi-Unit Converter</h1>
      <p class="text-xs font-mono text-slate-500 mt-2 max-w-lg mx-auto">Simultaneous multi-target unit conversion for pressure, temperature, flow, and mass engineering units.</p>
    </div>

    <!-- Body -->
    <div class="glass rounded-2xl p-6 md:p-8 neon-border">
      
      <div class="mb-4"><label class="text-[9px] font-mono text-slate-600 mb-2 block uppercase tracking-wider">Category</label>
        <select class="inp" id="uc-type" onchange="updateUC()">
          <option value="pressure">Pressure</option>
          <option value="temperature">Temperature</option>
          <option value="flow">Flow Rate</option>
          <option value="mass">Mass</option>
        </select>
      </div>
      <div class="mb-4"><label class="text-[9px] font-mono text-slate-600 mb-2 block uppercase tracking-wider">Input Value</label><input type="number" class="inp" id="uc-val" value="1" step="any" oninput="doUC()"></div>
      <div class="result-box" id="uc-results"></div>
    </div>

    <!-- Back -->
    <div class="text-center mt-8">
      <a href="../index.html#tools" class="inline-flex items-center gap-2 text-xs font-mono text-slate-500 hover:text-indigo-400 transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Back to toolkit
      </a>
    </div>

  </div>
</div>

<script>
lucide.createIcons();

const ucData={pressure:{units:['bar','psi','kPa','MPa','kg/cm\u00b2','mmH2O','inH2O','mmHg'],base:{'bar':1,'psi':0.0689476,'kPa':0.01,'MPa':10,'kg/cm\u00b2':0.980665,'mmH2O':9.80665e-5,'inH2O':0.00249089,'mmHg':0.00133322}},temperature:{units:['\u00b0C','\u00b0F','K'],special:true},flow:{units:['m\u00b3/h','GPM','L/min','L/s','bbl/d'],base:{'m\u00b3/h':1,'GPM':0.227124,'L/min':0.06,'L/s':3.6,'bbl/d':0.0066245}},mass:{units:['kg','lb','g','ton','oz'],base:{'kg':1,'lb':0.453592,'g':0.001,'ton':1000,'oz':0.0283495}}};
function updateUC(){const type=document.getElementById('uc-type').value,data=ucData[type];doUC();}
function doUC(){const type=document.getElementById('uc-type').value,data=ucData[type],val=parseFloat(document.getElementById('uc-val').value);const c=document.getElementById('uc-results');if(isNaN(val)){c.innerHTML='<div class="text-center text-slate-500 text-sm font-mono">Enter a value</div>';return}c.innerHTML='<div class="grid grid-cols-2 gap-3">';data.units.forEach(u=>{let r;if(type==='temperature'){let cels=val;if(u==='\u00b0F')cels=(val-32)*5/9;else if(u==='K')cels=val-273.15;if(data.units[0]==='\u00b0C'){let conv=cels;if(u==='\u00b0F')conv=cels*9/5+32;else if(u==='K')conv=cels+273.15;r=conv}else{r=val}}else{r=val*data.base[u]/data.base[data.units[0]]}c.innerHTML+='<div class="bg-white/3 rounded-lg p-3 text-center"><div class="text-[9px] font-mono text-slate-500">'+u+'</div><div class="text-sm font-bold font-mono text-slate-900 mt-0.5">'+(r<0.001?r.toExponential(4):r.toFixed(4))+'</div></div>'});c.innerHTML+='</div>';}
updateUC();
</script>
<script src="../assets/js/global.js"></script>
</body>
</html>

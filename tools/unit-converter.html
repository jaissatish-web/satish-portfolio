<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Unit Converter — Satish Jaiswal Portfolio</title>
<meta name="description" content="Convert between pressure, temperature, flow, length, and mass units — essential for P&ID review and instrument data sheets.">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{fontFamily:{inter:['Inter','sans-serif'],space:['Space Grotesk','sans-serif']}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#050507;color:#fff;overflow-x:hidden}
::selection{background:rgba(16,185,129,.3);color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(16,185,129,.3);border-radius:2px}
.glass{background:rgba(255,255,255,.02);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06)}
.glass-hover{transition:all .4s cubic-bezier(.4,0,.2,1)}
.glass-hover:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);transform:translateY(-2px)}
.inp{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#fff;padding:12px 16px;border-radius:12px;font-size:14px;transition:all .3s;outline:none;width:100%;font-family:'Inter',sans-serif}
.inp:focus{border-color:rgba(16,185,129,.5);box-shadow:0 0 0 4px rgba(16,185,129,.08);background:rgba(255,255,255,.06)}
.inp::placeholder{color:rgba(255,255,255,.2)}
select.inp option{background:#0a0a0f;color:#fff}
.result-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:16px;padding:20px}
.grad-text{background:linear-gradient(135deg,#fff 0%,#fff 40%,rgba(255,255,255,.4) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-text-emerald{background:linear-gradient(135deg,#10B981,#34D399,#6EE7B7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.chk-item{transition:all .3s}
.chk-item.done{opacity:.4}
.chk-item.done .chk-text{text-decoration:line-through}
.chk-item.done .chk-box{background:rgba(16,185,129,.2);border-color:#10B981}
.toast{position:fixed;bottom:30px;right:30px;padding:14px 28px;border-radius:14px;font-size:13px;font-weight:500;z-index:99999;transform:translateY(100px);opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);background:rgba(16,185,129,.95);color:#fff;backdrop-filter:blur(10px)}
.toast.show{transform:translateY(0);opacity:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- Nav -->
<nav class="fixed top-0 left-0 right-0 z-50" style="background:rgba(5,5,7,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.05)">
  <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
    <a href="../index.html" class="flex items-center gap-2.5 group">
      <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-emerald-500/20 to-emerald-400/10 border border-emerald-500/30 flex items-center justify-center group-hover:border-emerald-400/60 transition-all">
        <span class="text-emerald-400 font-bold text-[10px] font-space">SJ</span>
      </div>
      <span class="text-xs text-slate-400 group-hover:text-white transition-colors">&larr; Back to Portfolio</span>
    </a>
    <a href="../assets/docs/Satish_Jaiswal_Resume.pdf" target="_blank" class="inline-flex items-center gap-1.5 text-[10px] font-semibold uppercase tracking-wider text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-full hover:bg-emerald-500/20 transition-all">
      <i data-lucide="file-text" class="w-3 h-3"></i> Resume
    </a>
  </div>
</nav>

<!-- Main Content -->
<div class="min-h-screen flex items-center justify-center px-6 pt-14 pb-20">
  <div class="w-full max-w-2xl mx-auto" style="animation:fadeUp .6s ease forwards">

    <!-- Tool Header -->
    <div class="text-center mb-10 mt-8">
      <div class="w-14 h-14 rounded-2xl bg-rose-500/10 border border-rose-500/20 flex items-center justify-center mx-auto mb-5">
        <i data-lucide="repeat" class="w-7 h-7 text-rose-400"></i>
      </div>
      <h1 class="text-2xl md:text-3xl font-bold font-space grad-text">Engineering Unit Converter</h1>
      <p class="text-sm text-slate-500 mt-2">Convert between pressure, temperature, flow, length, and mass units — essential for P&ID review and instrument data sheets.</p>
    </div>

    <!-- Tool Body -->
    <div class="glass rounded-2xl p-6 md:p-8">
      
      <div class="mb-4"><label class="text-[10px] text-slate-400 mb-2 block uppercase tracking-wider font-medium">Category</label>
        <select class="inp" id="uc-type" onchange="updateUC()">
          <option value="pressure">Pressure</option><option value="temperature">Temperature</option><option value="flow">Flow Rate</option><option value="length">Length</option><option value="mass">Mass</option>
        </select>
      </div>
      <div class="grid md:grid-cols-3 gap-4 mb-6 items-end">
        <div><label class="text-[10px] text-slate-400 mb-2 block uppercase tracking-wider font-medium">From</label><select class="inp" id="uc-from" onchange="doUC()"></select></div>
        <div><label class="text-[10px] text-slate-400 mb-2 block uppercase tracking-wider font-medium">Value</label><input type="number" class="inp" id="uc-val" placeholder="Enter value" step="any" oninput="doUC()"></div>
        <div><label class="text-[10px] text-slate-400 mb-2 block uppercase tracking-wider font-medium">To</label><select class="inp" id="uc-to" onchange="doUC()"></select></div>
      </div>
      <div class="result-box text-center"><div class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Result</div><div id="uc-r1" class="text-2xl font-bold font-space text-rose-400">—</div></div>
    </div>

    <!-- Back Link -->
    <div class="text-center mt-8">
      <a href="../index.html#tools" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-emerald-400 transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Back to all tools
      </a>
    </div>

  </div>
</div>

<script>
lucide.createIcons();

const ucData={
  pressure:{units:['bar','psi','kPa','MPa','kg/cm\u00b2','mmH2O','inH2O','mmHg'],base:{'bar':1,'psi':.0689476,'kPa':.01,'MPa':10,'kg/cm\u00b2':.980665,'mmH2O':.0000980665,'inH2O':.00249089,'mmHg':.00133322}},
  temperature:{units:['\u00b0C','\u00b0F','K'],special:true},
  flow:{units:['m\u00b3/h','GPM','L/min','L/s','bbl/d'],base:{'m\u00b3/h':1,'GPM':.227124,'L/min':.06,'L/s':3.6,'bbl/d':.0066245}},
  length:{units:['mm','inch','m','ft','cm','micron'],base:{'mm':1,'inch':25.4,'m':1000,'ft':304.8,'cm':10,'micron':.001}},
  mass:{units:['kg','lb','g','ton','oz'],base:{'kg':1,'lb':.453592,'g':.001,'ton':1000,'oz':.0283495}}
};
function updateUC(){
  const type=document.getElementById('uc-type').value,data=ucData[type],fs=document.getElementById('uc-from'),ts=document.getElementById('uc-to');
  fs.innerHTML='';ts.innerHTML='';
  data.units.forEach((u,i)=>{fs.innerHTML+='<option value="'+u+'">'+u+'</option>';ts.innerHTML+='<option value="'+u+'" '+(i===1?'selected':'')+'>'+u+'</option>'});
  doUC();
}
function doUC(){
  const type=document.getElementById('uc-type').value,from=document.getElementById('uc-from').value,to=document.getElementById('uc-to').value,val=parseFloat(document.getElementById('uc-val').value);
  if(isNaN(val)){document.getElementById('uc-r1').textContent='\u2014';return}
  if(type==='temperature'){
    let c=val;
    if(from==='\u00b0F')c=(val-32)*5/9;else if(from==='K')c=val-273.15;
    let r=c;if(to==='\u00b0F')r=c*9/5+32;else if(to==='K')r=c+273.15;
    document.getElementById('uc-r1').textContent=r.toFixed(4)+' '+to;return;
  }
  const data=ucData[type],bv=val*data.base[from],r=bv/data.base[to];
  document.getElementById('uc-r1').textContent=r.toFixed(6)+' '+to;
}
updateUC();
</script>
</body>
</html>
